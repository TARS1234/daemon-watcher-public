services:
  - type: web
    name: daemon-watcher-relay
    runtime: python
    pythonVersion: "3.11.0"
    rootDir: .
    buildCommand: pip install -r relay/requirements.txt
    startCommand: python3 relay_server.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_TTL_SECONDS
        value: "90"
      - key: MAX_NODES_PER_NS
        value: "50"
